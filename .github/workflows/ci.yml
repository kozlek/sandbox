name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  # The check-run name GitHub reports is this job id, "ci".
  # It must match `merge_conditions: ["check-success=ci"]` in .mergify.yml.
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest -q
