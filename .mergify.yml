# ACTIVE sandbox config. Current scenario: skip_intermediate_results in PARALLEL
# mode via scope-dependency chains (MRGFY-7620).
# Full walkthrough: scenarios/skip-intermediate-results/README.md
#
# - mode: parallel            -> PRs with disjoint scopes are tested in parallel.
# - scopes.source.files       -> scope is derived from a PR's changed files.
#                                A PR touching backend/** is in the `backend`
#                                scope; frontend/** is in `frontend`.
# - skip_intermediate_results -> within a scope chain, a passing CHILD car
#                                promotes its not-yet-merged ANCESTORS, even if
#                                an ancestor's own car failed.
#
# PREREQUISITE: this org must be enabled in
# SKIP_INTERMEDIATE_RESULTS_PARALLEL_ENABLED_ORGS, otherwise the config is
# accepted but the parallel-mode skip never fires (see the scenario README).
merge_queue:
  mode: parallel
  max_parallel_checks: 5
  skip_intermediate_results: true

scopes:
  source:
    files:
      backend:
        include:
          - "backend/**"
      frontend:
        include:
          - "frontend/**"

queue_rules:
  - name: default
    # A PR only needs the `queue` label to ENTER the queue — deliberately no CI
    # condition here, so the broken-on-its-own ancestor (PR A) can still embark.
    queue_conditions:
      - "label=queue"
    # The merge gate, evaluated on each speculative car's CI:
    merge_conditions:
      - "check-success=ci"
    batch_size: 1
    merge_method: merge
merge_protections_settings:
  auto_merge_conditions: true
